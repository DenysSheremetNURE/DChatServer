version: '3.8'

services:
  chat-server:
    build: .
    ports:
      - "8080:8080"
    environment:
      - IS_DOCKER=true
    depends_on:
      chat-db:
        condition: service_healthy
    networks:
      - chat-network

  chat-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Yjdsqltybc29
      POSTGRES_DB: dchat
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dchat"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - chat-network

networks:
  chat-network:
    driver: bridge

volumes:
  db-data: